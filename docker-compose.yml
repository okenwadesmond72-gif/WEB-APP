version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: todo-app-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - todo-app-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: todo-app-server
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/todo-app?authSource=admin
      JWT_SECRET: your_super_secret_jwt_key_change_in_production
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - todo-app-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: todo-app-client
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - server
    networks:
      - todo-app-network

volumes:
  mongodb_data:

networks:
  todo-app-network:
    driver: bridge
